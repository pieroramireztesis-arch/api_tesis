[pytest]
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes -p no:warnings

markers =
    unit:        Pruebas de caja blanca (funciones puras, sin BD)
    component:   Pruebas de componente (módulo individual con mocks)
    black_box:   Pruebas de caja negra (endpoints HTTP)
    functional:  Pruebas funcionales (reglas de negocio STI)
    integration: Pruebas de integración (flujos multi-endpoint)
    acceptance:  Pruebas de aceptación (historias de usuario)
    e2e:         Pruebas extremo a extremo (sesión completa)
    db:          Requiere BD real (omitir si no hay conexión)